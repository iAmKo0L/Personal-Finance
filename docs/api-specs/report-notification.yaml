openapi: 3.0.3
info:
  title: service-report-notification API
  version: 1.0.0
servers:
  - url: http://localhost:15003
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: OK }
  /reports/monthly-summary:
    get:
      summary: Monthly summary report
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: string, example: '2025-09' }
      responses:
        '200': { description: Success }
  /reports/category-breakdown:
    get:
      summary: Category breakdown report
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: string, example: '2025-09' }
      responses:
        '200': { description: Success }
  /reports/cashflow:
    get:
      summary: Cashflow chart data
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: string, example: '2025-09' }
      responses:
        '200': { description: Success }
  /notifications:
    get:
      summary: List user notifications
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Success }
  /notifications/check-budget-alerts:
    post:
      summary: Generate notifications from budget alerts
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: string, example: '2025-09' }
      responses:
        '200': { description: Success }
  /notifications/budget-alerts:
    get:
      summary: Get budget alerts for a month
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: string, example: '2025-09' }
      responses:
        '200': { description: Success }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
