openapi: 3.0.3
info:
  title: service-auth-user API
  version: 1.0.0
servers:
  - url: http://localhost:5001
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /auth/register:
    post:
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password]
              properties:
                fullName: { type: string }
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '201': { description: Created }
        '400': { description: Bad request }
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200': { description: Success }
        '401': { description: Unauthorized }
  /users/me:
    get:
      summary: Current user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Success }
        '401': { description: Unauthorized }
    put:
      summary: Update profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName]
              properties:
                fullName: { type: string }
      responses:
        '200': { description: Success }
        '401': { description: Unauthorized }
  /users/settings:
    put:
      summary: Update user settings
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [defaultCurrency, monthlySpendingLimit]
              properties:
                defaultCurrency: { type: string }
                monthlySpendingLimit: { type: number }
      responses:
        '200': { description: Success }
        '401': { description: Unauthorized }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
